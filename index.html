<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>💘 MBTI Shorts Date</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --accent: #ff4d7d;
        --accent-2: #ff7aa2;
        --bg: #05040a;
        --glass: rgba(10, 12, 18, 0.60);
        --line: rgba(255, 255, 255, 0.10);
        --text: rgba(255,255,255,0.96);
        --muted: rgba(255,255,255,0.64);
        --shadow: 0 18px 48px rgba(0,0,0,0.34);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
        width:100%; height:100%; overflow:hidden;
        background:var(--bg);
        font-family:"Noto Sans KR", sans-serif;
        color:var(--text);
    }
    body { user-select:none; }

    .sc {
        position:fixed; inset:0;
        opacity:0; pointer-events:none;
        transition:opacity .28s ease;
        display:flex; flex-direction:column;
        z-index:1;
        background:var(--bg);
    }
    .sc.on { opacity:1; pointer-events:all; }

    .shorts-container {
        position:absolute; inset:0; z-index:-1; overflow:hidden; background:#000;
    }
    #vn-img, #r-img, #f-img {
        width:100%; height:100%; object-fit:cover; object-position:center top;
        transform:scale(1.02);
        filter:saturate(1.06) contrast(1.03) brightness(0.94);
        background:#09090d;
    }
    .overlay {
        position:absolute; inset:0;
        background:linear-gradient(180deg, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0.18) 30%, rgba(0,0,0,0.46) 62%, rgba(0,0,0,0.88) 100%);
        pointer-events:none;
    }
    .vignette {
        position:absolute; inset:0;
        background:radial-gradient(circle at 50% 14%, rgba(255,255,255,0.08), transparent 30%), radial-gradient(circle at 50% 100%, rgba(255,77,125,0.10), transparent 24%);
        pointer-events:none;
    }

    .dlg-shell {
        position:absolute;
        left:0; right:0;
        top:56vh;
        bottom:0;
        display:flex; flex-direction:column;
        justify-content:flex-start;
        gap:10px;
        padding:0 14px calc(14px + env(safe-area-inset-bottom));
        pointer-events:none;
    }

    .dlg-card {
        width:100%;
        max-height:33vh;
        overflow:auto;
        background:var(--glass);
        border:1px solid var(--line);
        backdrop-filter:blur(16px) saturate(1.1);
        -webkit-backdrop-filter:blur(16px) saturate(1.1);
        box-shadow:var(--shadow);
        border-radius:26px;
        padding:16px 16px 18px;
        position:relative;
    }
    .dlg-card::-webkit-scrollbar { width:0; height:0; }
    .dlg-card::before {
        content:""; position:absolute; inset:0;
        background:linear-gradient(135deg, rgba(255,255,255,0.07), transparent 44%);
        pointer-events:none;
    }
    .dlg-name {
        display:inline-flex; align-items:center; gap:7px;
        padding:7px 13px;
        margin-bottom:12px;
        background:linear-gradient(135deg, var(--accent), var(--accent-2));
        border-radius:999px;
        font-size:13px; font-weight:800; letter-spacing:-0.02em;
        align-self:flex-start; text-align:left;
        box-shadow:0 10px 22px rgba(255,77,125,0.24);
    }
    .dlg-name::before { content:"●"; font-size:9px; opacity:.9; }
    .dlg-txt {
        font-size:clamp(17px, 5.1vw, 23px);
        font-weight:700;
        line-height:1.46;
        letter-spacing:-0.02em;
        word-break:keep-all;
        text-align:left;
        text-shadow:0 2px 12px rgba(0,0,0,0.72);
        min-height:3.1em;
        padding-right:2px;
    }
    .tap-hint {
        margin-top:10px;
        font-size:12px;
        color:var(--muted);
        text-align:left;
        animation:blink 1.5s infinite;
    }

    .bottom-ui {
        margin-top:auto;
        width:100%;
        pointer-events:none;
    }
    .bottom-ui > * { pointer-events:all; }
    .ch-wrap {
        display:flex; flex-direction:column; gap:10px;
        opacity:0; transform:translateY(8px);
        transition:opacity .2s ease, transform .2s ease;
    }
    .ch-wrap.on { opacity:1; transform:translateY(0); }
    .ch-btn {
        width:100%;
        padding:15px 15px;
        background:rgba(255,255,255,0.10);
        border:1px solid rgba(255,255,255,0.13);
        color:#fff;
        border-radius:18px;
        font-size:clamp(14px, 4vw, 16px);
        line-height:1.45;
        font-weight:700;
        backdrop-filter:blur(12px);
        cursor:pointer;
        text-align:left;
        box-shadow:0 14px 28px rgba(0,0,0,0.18);
        transition:transform .14s ease, background .14s ease, border-color .14s ease;
    }
    .ch-btn:active { transform:scale(.985); background:rgba(255,77,125,0.16); border-color:rgba(255,77,125,0.35); }

    #si, #sg, #sr, #sf {
        justify-content:center; align-items:center; text-align:center;
        padding:18px;
        background:radial-gradient(circle at top, rgba(255,77,125,0.12), transparent 34%), linear-gradient(180deg, #09060d 0%, #040408 100%);
    }
    .screen-card {
        width:100%; max-width:380px;
        padding:22px;
        border-radius:28px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        backdrop-filter:blur(16px);
        box-shadow:var(--shadow);
    }
    .hero-icon { font-size:58px; line-height:1; filter:drop-shadow(0 10px 24px rgba(255,77,125,0.28)); }
    .hero-title { font-size:28px; font-weight:900; letter-spacing:-0.04em; margin-top:12px; }
    .hero-sub { margin-top:10px; color:var(--muted); font-size:14px; line-height:1.55; }
    .u-select {
        width:100%; padding:15px 14px;
        border-radius:14px;
        background:rgba(255,255,255,0.06);
        color:#fff; border:1px solid rgba(255,255,255,0.12);
        margin-top:12px; outline:none; font-size:15px; appearance:none;
    }
    .btn-start {
        width:100%; max-width:380px;
        padding:17px 18px;
        border:none; border-radius:999px;
        background:linear-gradient(135deg, var(--accent), var(--accent-2));
        color:#fff;
        font-size:17px; font-weight:800; letter-spacing:-0.02em;
        cursor:pointer;
        box-shadow:0 18px 34px rgba(255,77,125,0.25);
        transition:transform .14s ease, filter .14s ease;
    }
    .btn-start:active { transform:scale(.985); filter:brightness(.97); }

    .result-scroll {
        width:100%;
        max-width:420px;
        height:100%;
        overflow-y:auto;
        -webkit-overflow-scrolling:touch;
        padding:14px 4px calc(20px + env(safe-area-inset-bottom));
        display:flex;
        flex-direction:column;
        gap:12px;
    }
    .result-scroll::-webkit-scrollbar { width:0; height:0; }
    .result-head {
        text-align:center;
        padding-top:6px;
    }
    .result-head .hero-icon { font-size:52px; }
    .result-head h1 {
        font-size:clamp(24px, 6vw, 30px);
        font-weight:900;
        letter-spacing:-0.04em;
        margin-top:8px;
    }
    .result-grid {
        display:grid;
        gap:12px;
    }
    .result-panel {
        width:100%;
        padding:16px;
        border-radius:26px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
        box-shadow:var(--shadow);
        backdrop-filter:blur(16px);
        text-align:left;
    }
    .result-image-card {
        width:100%;
        height:min(38vh, 380px);
        min-height:220px;
        border-radius:28px;
        overflow:hidden;
        border:1px solid rgba(255,255,255,0.10);
        background:rgba(255,255,255,0.05);
        box-shadow:var(--shadow);
        position:relative;
        flex:0 0 auto;
    }
    .result-image-card::after {
        content:""; position:absolute; inset:0;
        background:linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.20) 100%);
        pointer-events:none;
    }
    .result-image-card img { width:100%; height:100%; object-fit:cover; object-position:center top; }
    .card-title {
        font-size:20px;
        font-weight:900;
        letter-spacing:-0.03em;
        line-height:1.3;
    }
    .chem-badge {
        display:inline-flex; align-items:center; justify-content:center;
        gap:8px; min-width:120px;
        padding:10px 16px; margin:12px 0 4px;
        border-radius:999px;
        background:linear-gradient(135deg, rgba(255,77,125,0.22), rgba(255,122,162,0.18));
        border:1px solid rgba(255,255,255,0.12);
        color:#fff; font-size:18px; font-weight:900;
        letter-spacing:-0.02em;
    }
    .subtle { color:var(--muted); line-height:1.6; font-size:14px; }

    .rank-list {
        display:grid;
        gap:10px;
        margin-top:10px;
    }
    .rank-row {
        display:grid;
        grid-template-columns:46px 1fr auto;
        gap:10px;
        align-items:center;
        padding:12px;
        border-radius:18px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.08);
    }
    .rank-avatar {
        width:46px; height:46px;
        border-radius:14px;
        overflow:hidden;
        background:rgba(255,255,255,0.07);
        flex:0 0 auto;
    }
    .rank-avatar img {
        width:100%; height:100%; object-fit:cover; object-position:center top;
    }
    .rank-meta {
        min-width:0;
        text-align:left;
    }
    .rank-meta .name {
        font-size:15px;
        font-weight:900;
        letter-spacing:-0.02em;
    }
    .rank-meta .desc {
        margin-top:2px;
        color:var(--muted);
        font-size:12px;
        line-height:1.35;
    }
    .rank-score {
        font-size:14px;
        font-weight:900;
        white-space:nowrap;
        text-align:right;
    }
    .rank-badge {
        display:inline-block;
        margin-top:4px;
        padding:4px 10px;
        border-radius:999px;
        background:rgba(255,77,125,0.12);
        border:1px solid rgba(255,255,255,0.10);
        font-size:12px;
        color:#fff;
        font-weight:800;
    }
    .footer-actions {
        display:grid;
        gap:10px;
        margin-top:2px;
        padding-bottom:2px;
    }

    @keyframes blink { 0%,100% { opacity:.18; } 50% { opacity:1; } }

    @media (max-width: 430px) {
        .dlg-shell { top:50vh; }
        .dlg-card { max-height:36vh; padding:14px 14px 16px; }
        .dlg-txt { font-size:clamp(16px, 4.9vw, 20px); line-height:1.42; }
        .hero-title { font-size:26px; }
        .result-image-card { height:min(37vh, 360px); min-height:220px; }
        .result-scroll { padding-top:10px; }
    }
</style>
</head>
<body onclick="handleGlobalTap()">

<div class="sc on" id="si">
    <div class="screen-card">
        <div class="hero-icon">💖</div>
        <h1 class="hero-title">MBTI 소개팅</h1>
        <p class="hero-sub">설레임 가득 소개팅에 나온 당신. 소개팅 상대의 MBTI를 맞추고, 당신과 어울리는지 알아보세요.</p>

        <div class="result-panel" style="margin-top:18px;">
            <p style="font-size:13px; color:var(--muted); margin-bottom:2px; text-align:left;">당신의 성별과 MBTI를 선택하세요</p>
            <select class="u-select" id="u-gender">
                <option value="M">남성</option>
                <option value="F">여성</option>
            </select>
            <select class="u-select" id="u-mbti"></select>
        </div>

        <button class="btn-start" style="margin-top:18px;" onclick="startGame(event)">데이트 시작 💘</button>
    </div>
</div>

<div class="sc" id="sc">
    <div class="shorts-container">
        <img id="vn-img" src="" alt="character">
        <div class="overlay"></div>
        <div class="vignette"></div>
    </div>

    <div class="dlg-shell">
        <div class="dlg-card">
            <span class="dlg-name" id="d-nm"></span>
            <div id="d-txt" class="dlg-txt"></div>
            <div id="tap-notice" class="tap-hint">화면을 터치하면 대사가 이어집니다</div>
        </div>

        <div class="bottom-ui">
            <div id="ch-wrap" class="ch-wrap"></div>
            <button class="btn-start" id="btn-qg" style="display:none; width:100%; max-width:none;" onclick="show('sg')">🔍 MBTI 맞히기</button>
        </div>
    </div>
</div>

<div class="sc" id="sg">
    <div class="screen-card">
        <h2 style="font-size:24px; font-weight:900; letter-spacing:-0.03em;">이 사람의 MBTI는 무엇일까요?</h2>
        <p class="hero-sub" style="margin-bottom:12px;">대화 흐름을 떠올리며 선택해 보세요.</p>
        <select id="guess-select" class="u-select"></select>
        <button class="btn-start" style="margin-top:14px;" onclick="submitGuess()">선택 완료</button>
    </div>
</div>

<div class="sc" id="sr">
    <div class="result-scroll" style="padding-top:14px; justify-content:flex-start;">
        <div class="result-head">
            <div class="hero-icon">💞</div>
            <h1>데이트 결과</h1>
            <p class="hero-sub">정답 여부와 함께, 지금까지 만난 사람들의 궁합을 한눈에 볼 수 있습니다.</p>
        </div>

        <div class="result-grid">
            <div class="result-image-card">
                <img id="r-img" src="" alt="result character">
            </div>

            <div class="result-panel">
                <h2 id="r-ttl" class="card-title"></h2>
                <div id="r-chem" class="chem-badge"></div>
                <p id="r-desc" class="subtle" style="margin-top:8px;"></p>
                <p id="r-correct" class="subtle" style="margin-top:10px; font-weight:700;"></p>
            </div>

            <div class="result-panel">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px;">
                    <h3 style="font-size:18px; font-weight:900; letter-spacing:-0.03em;">이번 매칭 순위</h3>
                    <span class="rank-badge">플레이어 MBTI 기준</span>
                </div>
                <div id="rank-list" class="rank-list"></div>
            </div>
        </div>

        <div class="footer-actions">
            <button class="btn-start" id="btn-next" onclick="nextRound()"></button>
        </div>
    </div>
</div>

<div class="sc" id="sf">
    <div class="result-scroll" style="padding-top:14px; justify-content:flex-start;">
        <div class="result-head">
            <div class="hero-icon">✨</div>
            <h1>FINAL REPORT</h1>
            <p class="hero-sub">최고 궁합과 함께 전체 매칭 결과를 정리했습니다.</p>
        </div>

        <div class="result-grid">
            <div class="result-image-card">
                <img id="f-img" src="" alt="best match character">
            </div>

            <div class="result-panel">
                <h2 id="f-name" class="card-title"></h2>
                <div id="f-percent" class="chem-badge"></div>
                <p id="f-desc" class="subtle" style="margin-top:8px;"></p>
            </div>

            <div class="result-panel">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px;">
                    <h3 style="font-size:18px; font-weight:900; letter-spacing:-0.03em;">전체 매칭 비교</h3>
                    <span class="rank-badge">정답 여부 포함</span>
                </div>
                <div id="final-rank-list" class="rank-list"></div>
            </div>
        </div>

        <div class="footer-actions">
            <button class="btn-start" onclick="location.reload()">다시 분석하기</button>
        </div>
    </div>
</div>

<script>
const MBTIS = ["ENFP","ENFJ","ENTP","ENTJ","ESFP","ESFJ","ESTP","ESTJ","INFP","INFJ","INTP","INTJ","ISFP","ISFJ","ISTP","ISTJ"];

const P = (m, f) => ({ m, f });
const C = (l, n, seg, key) => ({ l, n, seg, key });
const L = v => Array.isArray(v) ? v : [v];
const N = (seg, img, base, a, b, choices = []) => ({
  seg,
  img,
  lines: { base: L(base), A: L(a), B: L(b) },
  c: choices
});

const CHARS = [
  {
    name: "서연",
    gender: "F",
    mbti: "ENFP",
    images: ["seoyeon_01.gif","seoyeon_02.gif","seoyeon_03.gif","seoyeon_04.gif","seoyeon_05.gif","seoyeon_06.gif","seoyeon_07.gif","seoyeon_08.gif","seoyeon_09.gif","seoyeon_final.gif"],

story: [
  N(1, 0,
    ["[반짝 웃으며] 와, 드디어 만났네요! 생각보다 훨씬 편안해 보여요 💖", "[고개를 살짝 기울이며] 첫인상부터 괜찮은데요?"],
    ["[손을 흔들며] 오, 반응 빠른 거 좋네요! 저 이런 텐션 좋아요 ✨", "[미소를 짓고] 시작부터 분위기 괜찮네요."],
    ["[어깨를 풀며] 천천히 알아가는 것도 좋아요. 괜히 더 설레잖아요 😊", "[부드럽게 웃으며] 서두르지 않아도 괜찮아요."],
    [
      C(P("좋네요, 저도 반가워요", "좋아요, 저도 반가워요"), 1, 1, "A"),
      C(P("천천히 알아가도 괜찮죠", "천천히 알아가도 괜찮아요"), 1, 1, "B")
    ]
  ),
  N(1, 1,
    ["[활짝 웃으며] 바로 웃어주니까 저도 긴장 풀렸어요. 오늘 기분 좋다 🎀", "[눈을 반짝이며] 이런 반응이면 대화가 금방 재밌어질 것 같아요."],
    ["[장난스럽게 웃으며] 오, 제 텐션 잘 받아주네요?", "[손가락으로 가볍게 가리키며] 이 정도면 케미 예감인데요?"],
    ["[고개를 끄덕이며] 차분한 것도 좋죠. 오히려 더 오래 기억에 남아요.", "[부드럽게 미소 지으며] 이런 안정감, 생각보다 좋아요."],
    [
      C(P("저도 기분이 좋아지네요", "저도 기분이 좋아져요"), 2, 1, "A"),
      C(P("너무 빠른 텐션은 조금 어지럽네요", "너무 빠른 텐션은 조금 어지러워요"), 2, 1, "B")
    ]
  ),
  N(1, 2,
    ["[살짝 몸을 앞으로 기울이며] 저는 즉흥적인 날이 더 재밌더라고요. 계획대로만 가면 심심하잖아요? 😆", "[눈웃음 치며] 흐름 타는 대화, 은근 설레죠."],
    ["[손뼉을 살짝 치며] 맞아요, 즉흥은 예상 못 한 매력이 있죠!", "[장난스럽게] 오늘도 뭔가 사건이 생길 것 같은데요?"],
    ["[고개를 끄덕이며] 계획이 있으면 마음이 편해지긴 하죠. 그 안정감도 이해해요.", "[미소를 지으며] 너무 무리하지 않는 것도 중요하니까요."],
    [
      C(P("즉흥이 더 설레죠", "즉흥이 더 설레요"), 3, 1, "A"),
      C(P("계획이 조금은 있어야 편하죠", "계획이 조금은 있어야 편해요"), 3, 1, "B")
    ]
  ),
  N(2, 3,

    ["[부드럽게] 속도를 맞춰 주는 태도, 정말 고맙습니다. 배려가 느껴져서 편안해요.", "[미소를 지으며] 이런 호흡 좋아요."],
    ["[따뜻하게] 그 배려가 참 좋네요. 서로 무리하지 않는 게 중요하니까요.", "[고개를 끄덕이며] 편안하게 가요."],
    ["[차분하게] 천천히 알아가는 것도 충분히 좋습니다. 중요한 건 방향이니까요.", "[미소] 오래 볼 수 있는 관계가 좋아요."],
    [
      C(P("함께 성장하는 관계가 좋아요", "함께 성장하는 관계가 좋아요"), 7, 3, "A"),
      C(P("속도를 맞춰가면 좋죠", "속도를 맞춰가면 좋아요"), 7, 3, "B")
    ]
  ),
  N(3, 7,
    ["[환하게 웃으며] 이렇게 웃고 얘기하니 참 좋네요. 오늘 기분이 정말 좋아졌어요 😊", "[다정하게] 대화가 따뜻하네요."],
    ["[고마운 듯] 상대의 기분을 잘 끌어올리네요. 이런 반응, 저도 좋아합니다.", "[미소를 지으며] 참 좋네요."],
    ["[차분하게] 조용히 받아주셔서 더 편해요. 안정감이 느껴집니다.", "[부드럽게] 이런 편안함 오래 가면 좋겠어요."],
    [
      C(P("말보다 행동이 더 중요하죠", "말보다 행동이 더 중요해요"), 8, 3, "A"),
      C(P("이렇게 웃게 해주니 좋네요", "이렇게 웃게 해주니 좋아요"), 8, 3, "B")
    ]
  ),
  N(3, 8,
    ["[부드럽게] 이제는 서로 어떤 사람인지 감이 조금 오시죠? 마지막 힌트는 아껴둘게요.", "[미소를 지으며] 너무 어렵게는 안 갈게요."],
    ["[따뜻하게] 괜찮아요. 여기까지 온 것만으로도 충분히 좋네요.", "[고개를 끄덕이며] 이제 정리만 하면 됩니다."],
    ["[차분하게] 더 알고 싶다면 천천히 봐도 돼요. 저도 더 이야기하고 싶네요.", "[부드럽게] 마지막까지 편하게 가요."],
    [
      C(P("조금만 더 이야기해요", "조금만 더 이야기해요"), 9, 3, "A"),
      C(P("이제 정답으로 가볼까요", "이제 정답으로 가볼까요"), 9, 3, "B")
    ]
  ),
  N(4, 9,
    ["[따뜻하게 웃으며] 자, 이제 제가 어떤 사람인지 맞혀볼까요? 당신의 직감을 믿어볼게요 💛", "[미소를 지으며] 마지막만 남았습니다."],
    ["[부드럽게] 좋아요. 끝까지 따뜻한 흐름이네요.", "[고개를 끄덕이며] 이제 답할 시간입니다."],
    ["[차분하게] 마지막까지 분위기 좋네요. 천천히 마무리해볼까요.", "[미소] 편하게 해주세요."],
    [
      C(P("끝까지 분위기 이어가요", "끝까지 분위기 이어가요"), 10, 4, "A"),
      C(P("이제 정답으로 가볼까요", "이제 정답으로 가볼까요"), 10, 4, "B")
    ]
  ),
  N(4, 10,
    ["[따뜻하게 웃으며] 이제 답을 들을 시간이에요.", "[부드럽게] 도윤의 MBTI는 과연 무엇일까요?"]
  )
],
  }
];

let playerGender = "M";
let playerMBTI, targetList, curIdx = 0, curNode = 0, curLineIdx = 0, isDialogueActive = false;
let matchResults = [];
let currentLines = [];
let branchProfile = { 1: null, 2: null, 3: null, 4: null };

let audioCtx = null;
let masterGain = null;
let bgmGain = null;
let bgmTimer = null;
let bgmPlaying = false;
let bgmBarIndex = 0;

function initAudio() {
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);

    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.0001;
    bgmGain.connect(masterGain);

    const resumeOnce = () => { audioCtx.resume().catch(()=>{}); };
    document.addEventListener('pointerdown', resumeOnce, { passive:true });
    document.addEventListener('touchstart', resumeOnce, { passive:true });
}
function resumeAudio() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function tone({ freq, start, dur, type='sine', gain=0.03, target=null, detune=0, filterHz=null }) {
    const t = start ?? audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.detune.setValueAtTime(detune, t);
    if (filterHz) {
        const f = audioCtx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.setValueAtTime(filterHz, t);
        osc.connect(f);
        f.connect(g);
    } else {
        osc.connect(g);
    }
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), t + 0.012);
    g.gain.setValueAtTime(Math.max(0.0002, gain), t + Math.max(0.01, dur - 0.05));
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    g.connect(target || masterGain);
    osc.start(t);
    osc.stop(t + dur + 0.06);
}
function noiseHat(start, gain=0.01, dur=0.035) {
    const t = start ?? audioCtx.currentTime;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.45;
    const src = audioCtx.createBufferSource();
    const filter = audioCtx.createBiquadFilter();
    const g = audioCtx.createGain();
    filter.type = 'highpass';
    filter.frequency.value = 5200;
    src.buffer = buffer;
    src.connect(filter);
    filter.connect(g);
    g.connect(bgmGain);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.start(t);
    src.stop(t + dur + 0.02);
}
function playClickSfx() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    tone({ freq: 720, start: t, dur: 0.08, type: 'triangle', gain: 0.04, target: masterGain, filterHz: 3800 });
    tone({ freq: 1040, start: t + 0.03, dur: 0.08, type: 'sine', gain: 0.028, target: masterGain, filterHz: 4800 });
}
function playResultSfx(correct) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    if (correct) {
        tone({ freq: 523.25, start: t, dur: 0.12, type: 'sine', gain: 0.055, target: masterGain, filterHz: 5200 });
        tone({ freq: 659.25, start: t + 0.08, dur: 0.14, type: 'sine', gain: 0.06, target: masterGain, filterHz: 5200 });
        tone({ freq: 783.99, start: t + 0.16, dur: 0.18, type: 'triangle', gain: 0.05, target: masterGain, filterHz: 5000 });
    } else {
        tone({ freq: 392.00, start: t, dur: 0.11, type: 'triangle', gain: 0.04, target: masterGain, filterHz: 2600 });
        tone({ freq: 311.13, start: t + 0.08, dur: 0.12, type: 'sine', gain: 0.032, target: masterGain, filterHz: 2200 });
        tone({ freq: 261.63, start: t + 0.16, dur: 0.18, type: 'sine', gain: 0.028, target: masterGain, filterHz: 2000 });
    }
}
function startBgm() {
    resumeAudio();
    if (bgmPlaying) return;
    bgmPlaying = true;
    bgmBarIndex = 0;
    const t = audioCtx.currentTime;
    bgmGain.gain.cancelScheduledValues(t);
    bgmGain.gain.setValueAtTime(0.0001, t);
    bgmGain.gain.exponentialRampToValueAtTime(0.16, t + 0.7);
    scheduleBgmBar();
}
function scheduleBgmBar() {
    if (!bgmPlaying) return;
    const bpm = 104;
    const beat = 60 / bpm;
    const bar = beat * 4;
    const t0 = audioCtx.currentTime + 0.03;
    const progression = [
        { root: 261.63, third: 329.63, fifth: 392.00 },
        { root: 220.00, third: 261.63, fifth: 329.63 },
        { root: 174.61, third: 220.00, fifth: 261.63 },
        { root: 196.00, third: 246.94, fifth: 392.00 }
    ];
    const chord = progression[bgmBarIndex % progression.length];
    tone({ freq: chord.root / 2, start: t0, dur: 0.15, type: 'triangle', gain: 0.06, target: bgmGain, filterHz: 1200 });
    tone({ freq: chord.root / 2, start: t0 + beat * 2, dur: 0.14, type: 'triangle', gain: 0.055, target: bgmGain, filterHz: 1200 });
    [chord.root, chord.third, chord.fifth].forEach((f, idx) => {
        tone({ freq: f, start: t0, dur: bar * 0.98, type: 'sine', gain: idx === 0 ? 0.02 : 0.017, target: bgmGain, filterHz: 2600 });
        tone({ freq: f * 2, start: t0 + 0.01, dur: bar * 0.52, type: 'triangle', gain: 0.009, target: bgmGain, filterHz: 3600 });
    });
    tone({ freq: chord.third * 2, start: t0 + beat * 0.5, dur: 0.10, type: 'square', gain: 0.012, target: bgmGain, filterHz: 4200 });
    tone({ freq: chord.fifth * 2, start: t0 + beat * 1.5, dur: 0.10, type: 'sine', gain: 0.012, target: bgmGain, filterHz: 4600 });
    tone({ freq: chord.third * 2, start: t0 + beat * 2.5, dur: 0.10, type: 'square', gain: 0.012, target: bgmGain, filterHz: 4200 });
    tone({ freq: chord.fifth * 2, start: t0 + beat * 3.5, dur: 0.11, type: 'sine', gain: 0.012, target: bgmGain, filterHz: 4600 });
    [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5].forEach(offset => noiseHat(t0 + beat * offset, 0.0075, 0.03));
    bgmBarIndex++;
    bgmTimer = setTimeout(scheduleBgmBar, bar * 1000);
}
function stopBgmWithSfx(correct) {
    if (!audioCtx) return;
    playResultSfx(correct);
    const t = audioCtx.currentTime;
    bgmGain.gain.cancelScheduledValues(t);
    bgmGain.gain.setValueAtTime(Math.max(0.0001, bgmGain.gain.value || 0.0001), t);
    bgmGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    if (bgmTimer) clearTimeout(bgmTimer);
    bgmPlaying = false;
}

function show(id) {
    document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
    document.getElementById(id).classList.add('on');
}
function getImageForStage(c, stageIdx) {
    const arr = c.images || [];
    if (!arr.length) return '';
    return arr[Math.min(stageIdx, arr.length - 1)];
}
function makeFallbackPortrait(name) {
    const label = (name || 'CHAR').slice(0, 4);
    return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff4d7d"/>
          <stop offset="100%" stop-color="#2b1730"/>
        </linearGradient>
        <radialGradient id="r" cx="50%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1080" height="1440" fill="url(#g)"/>
      <rect width="1080" height="1440" fill="url(#r)"/>
      <circle cx="540" cy="520" r="190" fill="#ffd8d8" fill-opacity="0.18"/>
      <path d="M340 1180c34-180 104-270 200-270s166 90 200 270" fill="#ffffff" fill-opacity="0.14"/>
      <ellipse cx="540" cy="520" rx="156" ry="176" fill="#fff" fill-opacity="0.14"/>
      <text x="540" y="1210" fill="#fff" fill-opacity="0.92" font-size="68" font-family="Arial, sans-serif" text-anchor="middle">${label}</text>
    </svg>`);
}
function setPortrait(el, src, name) {
    el.onerror = null;
    el.src = src;
    el.alt = name || 'character';
    el.onerror = () => {
        el.onerror = null;
        el.src = makeFallbackPortrait(name);
    };
}
function renderRankList(containerId, items) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    const list = [...items].sort((a, b) => b.score - a.score);
    list.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
            <div class="rank-avatar"><img src="${item.image}" alt="${item.name}"></div>
            <div class="rank-meta">
                <div class="name">${idx + 1}. ${item.name}</div>
                <div class="desc">${item.correct ? '정답 맞힘' : `오답: ${item.guess} 선택`} · 정답 ${item.mbti}</div>
                <div class="rank-badge">${item.label}</div>
            </div>
            <div class="rank-score">${item.score}%</div>
        `;
        el.appendChild(row);
    });
}
function resetBranchProfile() {
    branchProfile = { 1: null, 2: null, 3: null, 4: null };
}
function getNodeLines(c, nodeIdx) {
    const node = c.story[nodeIdx];
    const key = branchProfile[node.seg] || 'base';
    return node.lines[key] || node.lines.base || [];
}
function choiceText(v) {
    if (typeof v === 'string') return v;
    if (!v) return '';
    return playerGender === 'F' ? (v.f ?? v.m ?? '') : (v.m ?? v.f ?? '');
}

(function init() {
    document.getElementById('u-mbti').innerHTML = MBTIS.map(m => `<option value="${m}">${m}</option>`).join('');
    document.getElementById('guess-select').innerHTML = MBTIS.map(m => `<option value="${m}">${m}</option>`).join('');
})();

function startGame(e) {
    e.stopPropagation();
    resumeAudio();
    playerGender = document.getElementById('u-gender').value;
    playerMBTI = document.getElementById('u-mbti').value;
    const gender = document.getElementById('u-gender').value;
    const targetGender = (gender === 'M') ? 'F' : 'M';
    targetList = CHARS.filter(c => c.gender === targetGender).slice(0, 3);
    curIdx = 0;
    matchResults = [];
    resetBranchProfile();
    startChat();
    startBgm();
}

function startChat() {
    curNode = 0;
    curLineIdx = 0;
    isDialogueActive = true;
    resetBranchProfile();
    const c = targetList[curIdx];
    document.getElementById('d-nm').textContent = c.name;
    setPortrait(document.getElementById('vn-img'), getImageForStage(c, 0), c.name);
    renderNode();
    show('sc');
    if (!bgmPlaying) startBgm();
}

function renderNode() {
    curLineIdx = 0;
    isDialogueActive = true;
    document.getElementById('ch-wrap').classList.remove('on');
    document.getElementById('btn-qg').style.display = 'none';
    document.getElementById('tap-notice').style.display = 'block';

    const c = targetList[curIdx];
    const node = c.story[curNode];
    setPortrait(document.getElementById('vn-img'), getImageForStage(c, node.img ?? curNode), c.name);

    currentLines = getNodeLines(c, curNode);
    showLine();
}

function showLine() {
    const txt = currentLines[curLineIdx] || '';
    document.getElementById('d-txt').textContent = txt;
    if (curLineIdx >= currentLines.length - 1) finishDialogue();
}

function finishDialogue() {
    isDialogueActive = false;
    document.getElementById('tap-notice').style.display = 'none';
    const c = targetList[curIdx];
    const node = c.story[curNode];
    const w = document.getElementById('ch-wrap');
    w.innerHTML = '';
    if (node.c && node.c.length > 0) {
        node.c.forEach(ch => {
            const b = document.createElement('button');
            b.className = 'ch-btn';
            b.textContent = choiceText(ch.l);
            b.onclick = (e) => {
                e.stopPropagation();
                playClickSfx();
                branchProfile[ch.seg] = ch.key;
                curNode = ch.n;
                renderNode();
            };
            w.appendChild(b);
        });
        w.classList.add('on');
    } else {
        document.getElementById('btn-qg').style.display = 'block';
        w.classList.add('on');
    }
}

function handleGlobalTap() {
    if (!isDialogueActive) return;
    if (curLineIdx < currentLines.length - 1) {
        curLineIdx++;
        showLine();
    }
}

function calculateChemistry(m1, m2) {
  let score = 50;
  for (let i = 0; i < 4; i++) if (m1[i] === m2[i]) score += 5;
  const goldenPairs = {
    "ENFP": ["INTJ", "INFJ"], "INTJ": ["ENFP", "ENTP"],
    "ENTP": ["INTJ", "INFJ"], "INFJ": ["ENFP", "ENTP"],
    "ENFJ": ["INFP", "ISFP"], "INFP": ["ENFJ", "ENTJ"],
    "ENTJ": ["INFP", "INTP"], "INTP": ["ENTJ", "ESTJ"],
    "ISFP": ["ENFJ", "ESFJ", "ESTJ"], "ESFP": ["ISTJ", "ISFJ"],
    "ISTJ": ["ESFP", "ESTP"], "ISFJ": ["ESFP", "ESTP"]
  };
  if (goldenPairs[m1] && goldenPairs[m1].includes(m2)) score += 35;
  if (m1[1] !== m2[1] && m1[2] !== m2[2]) score -= 15;
  score = Math.max(10, Math.min(99, score));
  if (score >= 90) return { percent: score, label: '천생연분', desc: '서로의 부족한 점을 완벽하게 채워주는 최고의 짝꿍입니다!' };
  if (score >= 75) return { percent: score, label: '아주 좋음', desc: '대화가 잘 통하고 에너지가 넘치는 사이입니다.' };
  if (score >= 60) return { percent: score, label: '좋음', desc: '서로 다른 점이 오히려 매력으로 다가오는 관계입니다.' };
  return { percent: score, label: '보통', desc: '서로를 존중한다면 안정적인 관계를 유지할 수 있습니다.' };
}

function submitGuess() {
    const c = targetList[curIdx];
    const guess = document.getElementById('guess-select').value;
    const chem = calculateChemistry(playerMBTI, c.mbti);
    const correct = (guess === c.mbti);
    matchResults.push({ name: c.name, image: getImageForStage(c, 0), mbti: c.mbti, guess, correct, score: chem.percent, label: chem.label, desc: chem.desc });

    document.getElementById('r-ttl').textContent = correct ? '🎉 정답입니다!' : `😢 정답은 ${c.mbti}였습니다!`;
    document.getElementById('r-chem').textContent = `${chem.label} (${chem.percent}%)`;
    document.getElementById('r-desc').textContent = chem.desc;
    document.getElementById('r-correct').textContent = correct ? '이번 선택은 맞았습니다.' : `이번 선택은 틀렸습니다. 당신의 선택: ${guess}`;
    setPortrait(document.getElementById('r-img'), getImageForStage(c, c.story.length - 1), c.name);
    document.getElementById('btn-next').textContent = (curIdx < 2) ? '다음 데이트 상대' : '최종 결과 분석';

    renderRankList('rank-list', matchResults);
    stopBgmWithSfx(correct);
    show('sr');
}

function nextRound() {
    if (curIdx < 2) {
        curIdx++;
        startChat();
    } else {
        showFinal();
    }
}

function showFinal() {
    const best = matchResults.reduce((p, c) => (p.score > c.score) ? p : c);
    document.getElementById('f-name').textContent = `최고의 소울메이트: ${best.name}`;
    document.getElementById('f-percent').textContent = `${best.label} (${best.score}%)`;
    document.getElementById('f-desc').textContent = best.desc;
    const bestChar = CHARS.find(c => c.name === best.name);
    setPortrait(document.getElementById('f-img'), getImageForStage(bestChar, bestChar.story.length - 1), best.name);
    renderRankList('final-rank-list', matchResults);
    show('sf');
}
