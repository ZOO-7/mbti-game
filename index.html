<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>💘 MBTI 데이트 - 16인 연애 시뮬레이션</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{width:100%;height:100%;background:#0a0005;font-family:"Noto Sans KR",sans-serif;color:#fff;}
.sc{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .35s ease;overflow:hidden;}
.sc.on{opacity:1;pointer-events:all;}
#si{background:linear-gradient(160deg,#1a0010,#2d0820,#0a0005);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;overflow-y:auto;}
.i-title{font-family:"Gowun Batang",serif;font-size:26px;text-align:center;margin:15px 0;line-height:1.4;background:linear-gradient(135deg,#ff8fb0,#f472a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.u-box{width:100%;max-width:340px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:20px;margin-bottom:20px;backdrop-filter:blur(8px);}
.u-label{font-size:12px;color:#f472a0;font-weight:700;margin-bottom:8px;display:block;}
.u-row{display:flex;gap:10px;margin-bottom:15px;}
.u-btn{flex:1;padding:12px;border:1px solid rgba(255,255,255,.2);border-radius:10px;background:rgba(0,0,0,0.3);color:#fff;cursor:pointer;}
.u-btn.active{background:#e8446a;border-color:#e8446a;font-weight:700;}
.u-select{width:100%;padding:12px;border-radius:10px;background:rgba(0,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,.2);}
.btn-start{width:100%;max-width:340px;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#e8446a,#f472a0);color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
.vn-bg{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;}
.vn-char-img{height:85%;object-fit:contain;z-index:2;}
.meet-gradient{position:absolute;inset:0;z-index:3;background:linear-gradient(to top,rgba(0,0,0,1) 0%,rgba(0,0,0,0.35) 45%,rgba(0,0,0,0) 85%);}
.dlg-panel{position:absolute;bottom:0;left:0;right:0;z-index:10;background:rgba(15,5,15,0.95);padding:20px;border-top:1px solid #e8446a;min-height:360px;backdrop-filter:blur(10px);}
.dlg-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;}
.dlg-name{padding:4px 14px;background:#e8446a;border-radius:15px;font-size:13px;font-weight:700;white-space:nowrap;}
.dlg-txt{font-size:15px;line-height:1.75;margin-bottom:15px;min-height:4.5em;}
.ch-btn{width:100%;padding:13px;margin-top:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;text-align:left;cursor:pointer;}
.btn-quick-guess{width:100%;margin-top:15px;padding:12px;background:#e8446a;border:none;border-radius:10px;color:#fff;font-weight:700;display:none;}
.btn-quick-guess.ready{display:block;}
.chem-badge{display:inline-block;padding:8px 20px;border-radius:20px;background:#e8446a;font-size:16px;font-weight:900;margin:15px 0;box-shadow:0 0 15px rgba(232,68,106,0.5);}
.report-box{width:90%;max-width:400px;margin:40px auto;background:rgba(255,255,255,0.05);border:1px solid #e8446a;border-radius:20px;padding:30px;text-align:center;backdrop-filter:blur(8px);}
.best-char-img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:3px solid #ff8fb0;margin-bottom:15px;}
#ad{background:#0a0005;display:flex;align-items:center;justify-content:center;padding:20px;}
.ad-wrap{width:100%;max-width:420px;background:rgba(255,255,255,0.06);border:1px solid rgba(232,68,106,0.7);border-radius:20px;padding:22px;text-align:center;box-shadow:0 0 30px rgba(232,68,106,0.15);}
.ad-pill{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(232,68,106,0.2);color:#ffb1c4;font-size:12px;font-weight:700;margin-bottom:14px;}
.ad-title{font-size:22px;font-weight:900;margin-bottom:10px;}
.ad-desc{color:#d7d7d7;line-height:1.7;font-size:14px;margin-bottom:18px;}
.ad-box{height:150px;border-radius:16px;border:1px dashed rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(232,68,106,0.18),rgba(255,255,255,0.03));color:#ffd2df;font-weight:700;margin-bottom:16px;}
.small-note{font-size:12px;color:#9d9d9d;line-height:1.6;margin-top:10px;}
</style>
</head>
<body>

<div class="sc on" id="si">
  <div style="font-size:60px;">💖</div>
  <h1 class="i-title">데이터 기반<br>정밀 궁합 시스템</h1>
  <div class="u-box">
    <span class="u-label">나의 성별</span>
    <div class="u-row">
      <button class="u-btn active" onclick="setGender('M', this)">남성</button>
      <button class="u-btn" onclick="setGender('F', this)">여성</button>
    </div>
    <span class="u-label">나의 MBTI</span>
    <select class="u-select" id="u-mbti"></select>
  </div>
  <button class="btn-start" onclick="startGame()">💖 매칭 시작</button>
</div>

<div class="sc" id="sc">
  <div class="vn-bg"><img id="vn-img" class="vn-char-img" src="" alt=""></div>
  <div class="meet-gradient"></div>
  <div class="dlg-panel">
    <div class="dlg-info"><span class="dlg-name" id="d-nm"></span><span id="d-step" style="font-size:11px;color:#f472a0;"></span></div>
    <div id="d-txt" class="dlg-txt"></div>
    <div id="ch-wrap"></div>
    <button class="btn-quick-guess" id="btn-qg" onclick="show('sg')">🔍 MBTI 맞히기</button>
  </div>
</div>

<div class="sc" id="sg" style="background:#1a0010; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <h2 style="margin-bottom:20px; text-align:center;">이 사람의 성격은?</h2>
    <select id="guess-select" class="u-select" style="max-width:300px; margin-bottom:20px;"></select>
    <button class="btn-start" onclick="submitGuess()">선택 완료</button>
</div>

<div class="sc" id="sr" style="background:#0a0005; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center;">
    <h2 id="r-ttl"></h2>
    <div id="r-chem" class="chem-badge"></div>
    <p id="r-desc" style="color:#ccc; margin-bottom:30px; line-height:1.6;"></p>
    <button class="btn-start" id="btn-next" onclick="nextRound()"></button>
</div>

<div class="sc" id="ad">
  <div class="ad-wrap">
    <div class="ad-pill">광고 시청 후 다음 만남 해금</div>
    <div class="ad-title">다음 이성 1명 공개</div>
    <div class="ad-desc">처음 3명은 무료로 바로 만나고, 그 이후부터는 광고를 보고 1명씩 다음 만남을 열 수 있도록 구성했습니다. 실제 Google 광고 SDK/애드 유닛은 이 자리로 연결하면 됩니다.</div>
    <div class="ad-box">Google 광고 영역 / Ad Placeholder</div>
    <button class="btn-start" onclick="confirmAd()">광고 시청 완료</button>
    <div class="small-note">※ 실제 서비스에서는 Google AdSense/AdMob 정책과 SDK에 맞게 연결하세요.</div>
  </div>
</div>

<div class="sc" id="sf" style="background:#0a0005; overflow-y:auto;">
    <div class="report-box">
        <h1 style="color:#ff8fb0; margin-bottom:20px;">최종 매칭 결과</h1>
        <img id="f-img" class="best-char-img" src="">
        <h2 id="f-name"></h2>
        <div id="f-percent" style="font-size:24px; font-weight:900; color:#ff8fb0; margin:10px 0;"></div>
        <p id="f-desc" style="margin-top:20px; line-height:1.6;"></p>
        <button class="btn-start" style="margin-top:30px;" onclick="location.reload()">다시 분석하기</button>
    </div>
</div>

<script>

    { t:"루프탑 바에 올라오자마자 바람이 너무 좋죠? 저는 이런 장면만 보면 심장이 먼저 뛰어요.", c:[{l:"저도 설레네요.",n:1},{l:"벌써 텐션이 높네요.",n:1}] },
    { t:"좋아요! 전 좋은 건 바로 표현하는 편이에요. 오늘은 발길 닿는 대로 가볼래요?", c:[{l:"즉흥 데이트 좋죠.",n:2},{l:"어디로 가든 재밌을 듯해요.",n:2}] },
    { t:"그럼 꽃집 들렀다가 골목 사진도 찍고, 마음 가는 곳은 그냥 들어가요. 계획보다 감각이 중요하거든요.", c:[{l:"감성적이라 매력 있어요.",n:3},{l:"상상력 대단하시네요.",n:3}] },

    { t:"맞죠? 이제 마지막 힌트. 전 모든 만남엔 특별한 뜻이 있다고 믿는 사람이에요.", c:[{l:"운명론자군요.",n:5},{l:"조금 로맨틱하네요.",n:5}] },

  { name:"지수", gender:"F", mbti:"INTJ", image:"1000032059.jpg", story:S(

  { name:"민서", gender:"F", mbti:"INFJ", image:"1000032059.jpg", story:S(

  { name:"소라", gender:"F", mbti:"ESFP", image:"1000032034.jpg", story:S(

    { t:"여기 괜찮네요. 불필요하게 시끄럽지 않고 필요한 것만 잘 갖춘 느낌입니다.", c:[{l:"실용적인 취향이시네요.",n:1},{l:"시원시원하네요.",n:1}] },
    { t:"전 직접 해보는 게 제일 빠르다고 생각합니다. 설명이 길어지면 피곤해져요.", c:[{l:"직관적으로 이해하시네요.",n:2},{l:"실전형이시군요.",n:2}] },
    { t:"문제 생기면 일단 해결부터 봅니다. 복잡하게 감정부터 흔들 필요는 없거든요.", c:[{l:"냉정한 듯 든든하네요.",n:3},{l:"현실적인 타입이네요.",n:3}] },
    { t:"전 과장도 별로고 불필요한 말도 별로예요. 짧아도 정확한 게 낫습니다.", c:[{l:"명료해서 좋네요.",n:4},{l:"무뚝뚝하지만 멋있어요.",n:4}] },
    { t:"당신은 생각보다 반응이 부드럽네요. 의외로 괜찮습니다.", c:[{l:"칭찬으로 받아들일게요.",n:5},{l:"이제 좀 풀리셨나요?",n:5}] },
    { t:"마지막 질문. 전 어떤 사람처럼 보이나요?", c:[] }
  )},
  { name:"상현", gender:"M", mbti:"ENTJ", image:"1000032036.jpg", story:S(
    { t:"좋습니다. 시작하죠. 오늘은 효율적으로 핵심만 확인하면 됩니다.", c:[{l:"정확하고 좋네요.",n:1},{l:"리더 느낌이 나네요.",n:1}] },
    { t:"전 목표가 분명한 편입니다. 결과가 없는 노력은 큰 의미가 없다고 보거든요.", c:[{l:"기준이 분명하시네요.",n:2},{l:"추진력 있어 보여요.",n:2}] },
    { t:"관계도 마찬가지예요. 애매한 태도보다 확실한 방향이 중요합니다.", c:[{l:"직진형이네요.",n:3},{l:"분명해서 좋습니다.",n:3}] },
    { t:"전 계획과 실행이 맞물려야 움직입니다. 말만 하는 건 별로예요.", c:[{l:"실행력이 좋겠네요.",n:4},{l:"강한 성격이 느껴져요.",n:4}] },
    { t:"전 상대의 속도와 의지가 분명한지 봐요. 흐리면 오래 못 갑니다.", c:[{l:"솔직해서 좋네요.",n:5},{l:"기준이 높으시군요.",n:5}] },
    { t:"이제 제 사고방식을 정확히 맞혀보세요.", c:[] }
  )}
];

const MBTI_ALL = MBTIS.slice();
let playerGender = 'M';
let playerMBTI = 'ENFP';
let targetList = [];
let curIdx = 0;
let curNode = 0;
let matchResults = [];
let adWatchedForNext = false;

(function init(){
  document.getElementById('u-mbti').innerHTML = MBTI_ALL.map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('guess-select').innerHTML = MBTI_ALL.map(m=>`<option value="${m}">${m}</option>`).join('');
})();

function show(id){ document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function setGender(g,b){ playerGender=g; b.parentElement.querySelectorAll('.u-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
function getTargetList(){ return playerGender === 'M' ? FEMALE_CHARS : MALE_CHARS; }

function startGame(){
  playerMBTI = document.getElementById('u-mbti').value;
  targetList = getTargetList();
  curIdx = 0;
  curNode = 0;
  matchResults = [];
  adWatchedForNext = false;
  startChat();
}

function startChat(){
  const c = targetList[curIdx];
  curNode = 0;
  document.getElementById('d-nm').textContent = c.name;
  document.getElementById('vn-img').src = c.image || '';
  renderNode();
  show('sc');
}

function renderNode(){
  const c = targetList[curIdx];
  const node = c.story[curNode];
  document.getElementById('d-step').textContent = `${curIdx + 1}/16명 (대화 ${curNode + 1}/${c.story.length})`;
  document.getElementById('d-txt').textContent = node.t;
  const w = document.getElementById('ch-wrap');
  w.innerHTML = '';
  if(node.c && node.c.length > 0){
    node.c.forEach(ch=>{
      const b = document.createElement('button');
      b.className = 'ch-btn';
      b.textContent = ch.l;
      b.onclick = () => { curNode = ch.n; renderNode(); };
      w.appendChild(b);
    });
    document.getElementById('btn-qg').style.display = 'none';
  } else {
    document.getElementById('btn-qg').style.display = 'block';
  }
}

function submitGuess(){
  const c = targetList[curIdx];
  const guess = document.getElementById('guess-select').value;
  const chem = calculateChemistry(playerMBTI, c.mbti);
  matchResults.push({ name:c.name, image:c.image, score:chem.percent, label:chem.label, desc:chem.desc });

  document.getElementById('r-ttl').textContent = (guess === c.mbti) ? '🎉 정답입니다!' : `😢 정답은 ${c.mbti}였습니다!`;
  document.getElementById('r-chem').textContent = `${chem.label} (${chem.percent}%)`;
  document.getElementById('r-desc').textContent = chem.desc;

  const nextIndex = curIdx + 1;
  if(nextIndex >= targetList.length){
    document.getElementById('btn-next').textContent = '최종 매칭 리포트';
  } else if(nextIndex >= 3){
    document.getElementById('btn-next').textContent = '광고 보고 다음 사람 만나기';
  } else {
    document.getElementById('btn-next').textContent = '다음 사람 만나기';
  }
  show('sr');
}

function nextRound(){
  const nextIndex = curIdx + 1;
  if(nextIndex >= targetList.length){
    showFinal();
    return;
  }
  if(nextIndex >= 3 && !adWatchedForNext){
    show('ad');
    return;
  }
  adWatchedForNext = false;
  curIdx = nextIndex;
  startChat();
}

function confirmAd(){
  adWatchedForNext = true;
  nextRound();
}

function showFinal(){
  const best = matchResults.reduce((p,c)=>(p.score > c.score ? p : c));
  document.getElementById('f-img').src = best.image || '';
  document.getElementById('f-name').textContent = best.name;
  document.getElementById('f-percent').textContent = `${best.label} (${best.score}%)`;
  document.getElementById('f-desc').textContent = `운명적인 16번의 만남 끝에, 당신의 진정한 소울메이트는 ${best.name}님으로 밝혀졌습니다! ${best.desc}`;
  show('sf');
}

function calculateChemistry(m1, m2){
  let score = 50;
  for(let i=0; i<4; i++) score += (m1[i] === m2[i]) ? 5 : 0;

  const goldenPairs = {
    ENFP:["INTJ","INFJ"], INTJ:["ENFP","ENTP"],
    ENTP:["INTJ","INFJ"], INFJ:["ENFP","ENTP"],
    ENFJ:["INFP","ISFP"], INFP:["ENFJ","ENTJ"],
    ENTJ:["INFP","INTP"], INTP:["ENTJ","ESTJ"],
    ISFP:["ENFJ","ESFJ","ESTJ"], ESFP:["ISTJ","ISFJ"],
    ISTJ:["ESFP","ESTP"], ISFJ:["ESFP","ESTP"]
  };
  if(goldenPairs[m1] && goldenPairs[m1].includes(m2)) score += 35;
  if(m1[1] !== m2[1] && m1[2] !== m2[2]) score -= 15;

  score = Math.max(10, Math.min(99, score));

  if(score >= 90) return { percent:score, label:'천생연분', desc:'서로의 부족한 점을 완벽하게 채워주는, 우주가 점지해준 최고의 짝꿍입니다!' };
  if(score >= 75) return { percent:score, label:'아주 좋음', desc:'함께 있으면 시간 가는 줄 모를 정도로 대화가 잘 통하고 에너지가 넘치는 사이입니다.' };
  if(score >= 60) return { percent:score, label:'좋음', desc:'서로 다른 점도 있지만, 그것이 오히려 매력으로 다가오는 건강한 관계입니다.' };
  if(score >= 40) return { percent:score, label:'보통', desc:'적당한 거리감과 존중이 있다면 아주 편안하고 안정적인 관계를 유지할 수 있습니다.' };
  return { percent:score, label:'노력 필요', desc:'사고방식이 매우 달라 오해가 생길 수 있지만, 서로를 이해하려 노력한다면 가장 크게 성장할 수 있는 사이입니다.' };
}
</script>
